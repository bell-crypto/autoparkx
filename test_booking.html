<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>AutoParkX • Confirm Animation</title>

  <style>
    :root{
      --bg:#0b1220;
      --card:#0f172a;
      --text:#e5e7eb;
      --muted:#9ca3af;
      --tint:#60a5fa;

      --btnH:56px;
      --btnR:18px;

      --shadow:0 14px 28px rgba(0,0,0,.45);
      --shadowSoft:0 8px 18px rgba(0,0,0,.28);

      --safe-top: env(safe-area-inset-top);
      --safe-btm: env(safe-area-inset-bottom);
    }

    *{ box-sizing:border-box }
    html,body{ height:100% }
    body{
      margin:0;
      background:
        radial-gradient(900px 420px at 20% 0%, rgba(96,165,250,.18), transparent 60%),
        radial-gradient(900px 420px at 80% 100%, rgba(16,185,129,.10), transparent 60%),
        var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Inter,sans-serif;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px 14px calc(24px + var(--safe-btm));
    }

    .card{
      width:min(620px, 100%);
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border:1px solid rgba(255,255,255,.08);
      border-radius:22px;
      box-shadow: var(--shadow);
      padding:18px;
    }

    .title{
      font-size:16px;
      font-weight:800;
      letter-spacing:.2px;
      margin:0 0 10px;
    }
    .sub{
      margin:0 0 16px;
      color:var(--muted);
      font-size:13px;
      line-height:1.45;
    }

    /* ===== Confirm Button Container ===== */
    .confirmWrap{
      position:relative;
      height: var(--btnH);
      border-radius: var(--btnR);
      overflow:hidden;
      box-shadow: var(--shadowSoft);
      border:1px solid rgba(255,255,255,.10);
      background: linear-gradient(180deg, rgba(96,165,250,.24), rgba(96,165,250,.12));
    }

    .confirmBtn{
      position:absolute; inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      border:0;
      width:100%;
      height:100%;
      cursor:pointer;
      color:var(--text);
      background: transparent;
      font-weight:900;
      letter-spacing:.2px;
      font-size:15px;
      transition: transform .15s ease, opacity .2s ease;
      user-select:none;
      -webkit-tap-highlight-color: transparent;
    }
    .confirmBtn:active{ transform: scale(.985) }

    .confirmBtn .dot{
      width:10px;height:10px;border-radius:50%;
      background: var(--tint);
      box-shadow: 0 0 0 6px rgba(96,165,250,.16);
    }

    .confirmWrap.isRunning .confirmBtn{
      opacity:0;
      pointer-events:none;
      transform: translateY(8px);
    }

    /* ===== Animation Stage ===== */
    .stage{
      position:absolute; inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      pointer-events:none;
      opacity:0;
      transform: translateY(6px);
      transition: opacity .18s ease, transform .18s ease;
    }
    .confirmWrap.isRunning .stage{
      opacity:1;
      transform: translateY(0);
    }

    /* road */
    .road{
      position:absolute;
      left:0; right:0;
      bottom:10px;
      height:10px;
      opacity:.55;
      background:
        linear-gradient(90deg,
          rgba(255,255,255,.0) 0%,
          rgba(255,255,255,.16) 12%,
          rgba(255,255,255,.0) 24%,
          rgba(255,255,255,.16) 36%,
          rgba(255,255,255,.0) 48%,
          rgba(255,255,255,.16) 60%,
          rgba(255,255,255,.0) 72%,
          rgba(255,255,255,.16) 84%,
          rgba(255,255,255,.0) 100%
        );
      background-size: 200px 10px;
      animation: roadMove 900ms linear infinite;
      filter: blur(.15px);
    }
    @keyframes roadMove{
      from{ background-position: 0 0; }
      to{ background-position: -200px 0; }
    }

    /* status */
    .status{
      position:absolute;
      top:50%;
      transform: translateY(-50%);
      font-weight:900;
      letter-spacing:.2px;
      font-size:13px;
      color: rgba(255,255,255,.92);
      text-shadow: 0 2px 10px rgba(0,0,0,.35);
      opacity:.92;
    }

    /* ===== Car wrapper (moves) ===== */
    .car{
      position:absolute;
      left:-48%;
      bottom:10px;
      width: 250px;
      height: 82px;
      transform: translateX(0);
      animation: carRun 1.35s cubic-bezier(.2,.9,.25,1) forwards;
      filter: drop-shadow(0 10px 18px rgba(0,0,0,.35));
      will-change: transform;
    }
    @keyframes carRun{
      0%   { transform: translateX(0) translateY(0); }
      8%   { transform: translateX(16%) translateY(-1px); }
      100% { transform: translateX(175%) translateY(0); }
    }

    /* ===== SVG Civic FE stance ===== */
    .car-fe svg{ display:block; width:100%; height:100% }

    .car-fe .wheel .spokes{
      transform-origin: 0 0;
      animation: spinSvg 420ms linear infinite;
    }
    @keyframes spinSvg{
      from{ transform: rotate(0deg); }
      to{ transform: rotate(360deg); }
    }

    .car-fe .speedLines{
      animation: spPulse 260ms ease-in-out infinite alternate;
    }
    @keyframes spPulse{
      from{ opacity:.28; transform: translateX(0); }
      to{ opacity:.60; transform: translateX(-6px); }
    }

    .hintRow{
      display:flex; gap:10px; flex-wrap:wrap;
      margin-top:14px;
      color:var(--muted);
      font-size:12px;
    }
    .chip{
      padding:8px 10px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.04);
    }

    @media (prefers-reduced-motion: reduce){
      .road, .car, .car-fe .wheel .spokes, .car-fe .speedLines{ animation:none !important; }
    }
  </style>
</head>

<body>
  <div class="card">
    <p class="title">ปุ่มยืนยัน (รถวิ่งแบบในรูป)</p>
    <p class="sub">กด “ยืนยัน” แล้วปุ่มจะเล่นอนิเมชันรถสีขาวทรงเตี้ย (stance) วิ่งจากซ้ายไปขวา</p>

    <div class="confirmWrap" id="confirmWrap">
      <button class="confirmBtn" id="confirmBtn" type="button" aria-label="ยืนยัน">
        <span class="dot" aria-hidden="true"></span>
        ยืนยัน
      </button>

      <div class="stage" aria-hidden="true">
        <div class="status" id="statusText">กำลังยืนยัน…</div>
        <div class="road"></div>

        <!-- CAR -->
        <div class="car car-fe" id="car">
          <svg viewBox="0 0 520 170" aria-hidden="true">
            <!-- เงาใต้ท้อง -->
            <ellipse cx="260" cy="148" rx="210" ry="16" fill="rgba(0,0,0,.28)"/>

            <!-- ตัวถัง (ขาว) -->
            <path d="M60 112
                     C90 94, 135 80, 185 74
                     C215 52, 260 38, 304 40
                     C348 42, 385 60, 410 82
                     L468 92
                     C485 95, 495 104, 498 116
                     C501 129, 493 140, 478 141
                     L90 141
                     C67 141, 52 132, 54 118
                     C55 116, 57 114, 60 112Z"
                  fill="url(#paintBody)" stroke="rgba(11,18,32,.22)" stroke-width="2" />

            <!-- กันชนหน้า + ช่องลม -->
            <path d="M454 102
                     C474 105, 482 114, 480 126
                     C478 138, 468 140, 455 140
                     L432 140
                     C444 132, 450 120, 454 102Z"
                  fill="rgba(11,18,32,.86)" opacity=".92"/>

            <!-- ไฟหน้า -->
            <path d="M430 95
                     C450 90, 467 95, 476 106
                     C460 110, 444 110, 428 106Z"
                  fill="rgba(210,235,255,.92)"/>
            <path d="M430 95
                     C450 90, 467 95, 476 106"
                  stroke="rgba(120,200,255,.55)" stroke-width="4" fill="none" opacity=".6"/>

            <!-- ไฟท้าย -->
            <path d="M70 110
                     C88 103, 102 106, 112 116
                     C98 122, 84 123, 68 120Z"
                  fill="rgba(239,68,68,.95)"/>

            <!-- เส้นสันข้าง -->
            <path d="M98 120
                     C165 110, 238 104, 318 104
                     C370 104, 412 106, 450 110"
                  stroke="rgba(11,18,32,.18)" stroke-width="3" fill="none" opacity=".65"/>

            <!-- กระจก/หลังคาดำ (เหมือนรูป) -->
            <path d="M200 74
                     C230 56, 262 48, 300 50
                     C336 52, 360 64, 382 82
                     C332 86, 266 88, 192 86
                     C192 82, 194 78, 200 74Z"
                  fill="rgba(11,18,32,.78)" stroke="rgba(255,255,255,.12)" stroke-width="2"/>

            <!-- กระจก (ไฮไลท์ฟ้าอ่อน) -->
            <path d="M218 76
                     C244 62, 266 56, 296 56
                     C318 56, 336 62, 356 76
                     C320 80, 270 82, 220 82Z"
                  fill="rgba(96,165,250,.18)" opacity=".95"/>

            <!-- สปอยเลอร์ท้าย -->
            <path d="M62 106
                     C76 98, 94 96, 110 100
                     L108 94
                     C92 88, 74 90, 58 100Z"
                  fill="rgba(11,18,32,.80)"/>

            <!-- ล้อหลัง -->
            <g class="wheel wRear" transform="translate(150 132)">
              <circle r="26" fill="rgba(11,18,32,.98)"/>
              <circle r="18" fill="rgba(31,41,55,.98)"/>
              <g class="spokes">
                <circle r="3" fill="rgba(209,213,219,.92)"/>
                <path d="M0-16 L0 16" stroke="rgba(209,213,219,.75)" stroke-width="3" stroke-linecap="round"/>
                <path d="M-16 0 L16 0" stroke="rgba(209,213,219,.75)" stroke-width="3" stroke-linecap="round"/>
                <path d="M-11-11 L11 11" stroke="rgba(209,213,219,.6)" stroke-width="3" stroke-linecap="round"/>
                <path d="M-11 11 L11 -11" stroke="rgba(209,213,219,.6)" stroke-width="3" stroke-linecap="round"/>
              </g>
              <circle r="26" fill="none" stroke="rgba(255,255,255,.20)" stroke-width="3"/>
            </g>

            <!-- ล้อหน้า -->
            <g class="wheel wFront" transform="translate(392 132)">
              <circle r="26" fill="rgba(11,18,32,.98)"/>
              <circle r="18" fill="rgba(31,41,55,.98)"/>
              <g class="spokes">
                <circle r="3" fill="rgba(209,213,219,.92)"/>
                <path d="M0-16 L0 16" stroke="rgba(209,213,219,.75)" stroke-width="3" stroke-linecap="round"/>
                <path d="M-16 0 L16 0" stroke="rgba(209,213,219,.75)" stroke-width="3" stroke-linecap="round"/>
                <path d="M-11-11 L11 11" stroke="rgba(209,213,219,.6)" stroke-width="3" stroke-linecap="round"/>
                <path d="M-11 11 L11 -11" stroke="rgba(209,213,219,.6)" stroke-width="3" stroke-linecap="round"/>
              </g>
              <circle r="26" fill="none" stroke="rgba(255,255,255,.20)" stroke-width="3"/>
            </g>

            <!-- เส้นความเร็ว -->
            <g class="speedLines" opacity=".55">
              <path d="M40 106 L110 106" stroke="rgba(255,255,255,.55)" stroke-width="5" stroke-linecap="round"/>
              <path d="M22 122 L98 122" stroke="rgba(255,255,255,.35)" stroke-width="4" stroke-linecap="round"/>
              <path d="M54 92 L124 92" stroke="rgba(255,255,255,.28)" stroke-width="4" stroke-linecap="round"/>
            </g>

            <defs>
              <linearGradient id="paintBody" x1="0" y1="0" x2="0" y2="170">
                <stop offset="0" stop-color="#ffffff"/>
                <stop offset=".75" stop-color="#e9eef7"/>
                <stop offset="1" stop-color="#dfe7f3"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
      </div>
    </div>

    <div class="hintRow">
      <div class="chip">✅ กันกดซ้ำระหว่างวิ่ง</div>
      <div class="chip">🛞 ล้อหมุน + เส้นสปีด</div>
      <div class="chip">⏱️ ปรับเวลาได้ใน JS</div>
    </div>
  </div>

  <script>
    (function(){
      const wrap = document.getElementById('confirmWrap');
      const btn  = document.getElementById('confirmBtn');
      const car  = document.getElementById('car');
      const statusText = document.getElementById('statusText');

      let running = false;

      // ต้องมากกว่าเวลา carRun (1.35s) นิดหน่อย
      const ANIM_MS = 1550;

      function restartCarAnimation(){
        car.style.animation = 'none';
        void car.offsetHeight; // force reflow
        car.style.animation = '';
      }

      function runAnim(){
        if(running) return;
        running = true;

        wrap.classList.add('isRunning');
        statusText.textContent = 'กำลังยืนยัน…';

        restartCarAnimation();

        // ตัวอย่าง: ถ้าผูก API จริง ให้เรียก fetch ตรงนี้ได้
        // fetch('/api/booking_create.php', {method:'POST', body:...})
        //   .then(r=>r.json())
        //   .then(data=>{ ... })
        //   .catch(()=>{ ... });

        setTimeout(()=>{
          statusText.textContent = 'สำเร็จ';
        }, Math.max(ANIM_MS - 420, 0));

        setTimeout(()=>{
          wrap.classList.remove('isRunning');
          running = false;
        }, ANIM_MS);
      }

      btn.addEventListener('click', runAnim);

      btn.addEventListener('keydown', (e)=>{
        if(e.key === 'Enter' || e.key === ' '){
          e.preventDefault();
          runAnim();
        }
      });
    })();
  </script>
</body>
</html>
