<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>AutoParkX</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="AutoParkX">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ffffff">

<style>
:root{
  --bg:#ffffff;
  --text:#0b1220;
  --tint:#0a84ff;
  --muted:#6b7280;
  --safe-top: env(safe-area-inset-top);
  --safe-btm: env(safe-area-inset-bottom);
}
*{box-sizing:border-box}
html,body{
  margin:0;
  width:100%;
  height:100%;
  background:var(--bg);
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Inter,sans-serif;
}
body{
  display:flex;
  align-items:center;
  justify-content:center;
  transition:opacity .45s ease;
}
.wrap{
  width:100%;
  height:100%;
  padding:var(--safe-top) 0 var(--safe-btm);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}
.title{
  font-size:26px;
  font-weight:900;
  letter-spacing:.3px;
  margin-bottom:12px;
  color:var(--text);
}
#lottie{
  width:260px;
  height:260px;
}
.from{
  position:fixed;
  bottom:18px;
  font-size:13px;
  color:var(--muted);
}
.from span{
  color:var(--tint);
  font-weight:800;
}
</style>
</head>

<body>
<div class="wrap">
  <div class="title">AutoParkX</div>
  <div id="lottie"></div>
</div>
<div class="from">from <span>AutoParkX</span></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>

<script>
/* ================= CONFIG ================= */
const LOTTIE_PATH = '/assets/lottie/Man waiting car.json';

const GO_TO_HOME = '/index.html';
const GO_TO_ONBOARDING = '/onboarding.html';
const GO_TO_CONSENT = '/consent.html';

const API_BASE = `${location.origin}/api`;
const CONSENT_VERSION = 'v1';

// timing
const MIN_TIME = 900;
const MAX_TIME = 2200;
const SPEED = 1.7;

/* ================ LOGIC ================= */
const el = document.getElementById('lottie');
const startTime = Date.now();

let animLoaded = false;
let routeResolved = false;
let redirected = false;
let nextTarget = GO_TO_HOME;

const anim = lottie.loadAnimation({
  container: el,
  renderer: 'svg',
  loop: true,
  autoplay: true,
  path: LOTTIE_PATH
});

anim.setSpeed(SPEED);

function getUid() {
  try {
    const a = (localStorage.getItem('apx_user_id') || '').trim();
    const b = (localStorage.getItem('user_id') || '').trim();
    if (a) return a;
    if (b) return b;
  } catch {}

  try {
    const raw = localStorage.getItem('parking_user') || '';
    if (!raw) return '';
    const u = JSON.parse(raw);
    const uid = u?.id ?? u?.user_id ?? u?.uid ?? u?.user?.id ?? '';
    return uid ? String(uid).trim() : '';
  } catch {}

  return '';
}

async function decideTarget() {
  const onboardDone = localStorage.getItem('onboarding_done') === '1';

  if (!onboardDone) {
    return GO_TO_ONBOARDING;
  }

  const uid = getUid();

  // ยังไม่ได้ล็อกอิน / ไม่มี user ให้เข้าหน้า index ได้
  if (!uid) {
    return GO_TO_HOME;
  }

  try {
    const res = await fetch(`${API_BASE}/consent_status.php`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      cache: 'no-store',
      body: JSON.stringify({ user_id: Number(uid) })
    });

    const data = await res.json().catch(() => ({}));

    // user ไม่มีจริง / user_id พัง → กลับหน้าแรก
    if (!res.ok || !data.ok) {
      if (res.status === 404 || res.status === 422) {
        return GO_TO_HOME;
      }

      // กรณี API มีปัญหา แต่มี user อยู่ ให้พาไป consent ไว้ก่อน
      return `${GO_TO_CONSENT}?next=index.html&uid=${encodeURIComponent(uid)}`;
    }

    const accepted = Number(data.consent_accepted || 0) === 1;
    const versionOk = !data.consent_version || String(data.consent_version) === CONSENT_VERSION;

    if (!accepted || !versionOk) {
      return `${GO_TO_CONSENT}?next=index.html&uid=${encodeURIComponent(uid)}`;
    }

    try {
      localStorage.setItem(`apx_uid_${uid}_consent_${CONSENT_VERSION}`, 'accepted');
      sessionStorage.setItem(`apx_uid_${uid}_consent_${CONSENT_VERSION}`, 'accepted');
    } catch {}

    return GO_TO_HOME;
  } catch (e) {
    console.error('splash consent check failed', e);
    return `${GO_TO_CONSENT}?next=index.html&uid=${encodeURIComponent(uid)}`;
  }
}

function fadeTo(url) {
  if (redirected) return;
  redirected = true;
  document.body.style.opacity = '0';
  setTimeout(() => location.replace(url), 450);
}

function maybeGo() {
  if (!animLoaded || !routeResolved || redirected) return;

  const elapsed = Date.now() - startTime;
  if (elapsed >= MIN_TIME) {
    fadeTo(nextTarget);
  } else {
    setTimeout(() => {
      if (!redirected) fadeTo(nextTarget);
    }, MIN_TIME - elapsed);
  }
}

anim.addEventListener('DOMLoaded', () => {
  animLoaded = true;
  maybeGo();
});

(async function initSplash() {
  nextTarget = await decideTarget();
  routeResolved = true;
  maybeGo();
})();

setTimeout(() => {
  if (redirected) return;

  if (!routeResolved) {
    routeResolved = true;
    nextTarget = GO_TO_HOME;
  }

  if (!animLoaded) {
    animLoaded = true;
  }

  maybeGo();
}, MAX_TIME);
</script>
</body>
</html>
